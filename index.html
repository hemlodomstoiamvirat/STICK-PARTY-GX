<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horizon GX</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:black;
}

#menu{
width:100%;
height:100vh;
background:url('lobby.png') center center/cover no-repeat;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.title{
font-size:60px;
color:white;
text-shadow:0 0 20px red;
margin-bottom:40px;
}

.btn{
width:250px;
padding:15px;
margin:10px;
font-size:22px;
border:none;
border-radius:12px;
background:#ff003c;
color:white;
box-shadow:0 0 20px #ff003c;
}

.btn:active{
transform:scale(0.95);
}

#credits{
margin-top:30px;
font-size:22px;
color:white;
background:rgba(0,0,0,0.6);
padding:10px 20px;
border-radius:10px;
}
@media (orientation: portrait) {
  body::before {
    content: "🔄 Please Rotate Your Phone";
    position: fixed;
    inset: 0;
    background: black;
    color: white;
    font-size: 30px;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
  }
}
</style>
</head>

<body>

<div id="menu">

<div class="title">
🏁 HORIZON GX
</div>

<button class="btn" onclick="play()">
▶ PLAY
</button>

<button class="btn">
🚗 GARAGE
</button>

<button class="btn">
🗺️ MAP
</button>

<button class="btn">
🏆 LEADERBOARD
</button>

<div id="credits">
💰 Credits: 5000
</div>

</div>

<script>

function play(){
alert("🚗 BMW M5 Black Demon Ready!");
}

</script>

</body>
</html>
