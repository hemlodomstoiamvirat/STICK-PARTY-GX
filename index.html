<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STICK PARTY GX</title>

<style>
body{
background:#0a0a0a;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

h1{
color:#ff003c;
text-shadow:0 0 15px #ff003c;
}

.card{
background:#111;
border:2px solid #ff003c;
border-radius:20px;
padding:20px;
max-width:700px;
margin:auto;
box-shadow:0 0 20px #ff003c;
}

input{
width:80%;
padding:10px;
margin:5px;
border-radius:10px;
border:none;
}

button{
background:#ff003c;
color:white;
border:none;
padding:12px 20px;
border-radius:10px;
margin:5px;
font-size:16px;
}

#game{
display:none;
margin-top:20px;
}

.racer{
font-size:30px;
margin:10px;
transition:0.2s;
}
</style>
</head>

<body>

<h1>⚔️ STICK PARTY GX ⚔️</h1>

<div class="card">

<h2>Players</h2>

<input id="p1" value="Player 1"><br>
<input id="p2" value="Player 2"><br>
<input id="p3" value="Player 3"><br>
<input id="p4" value="Player 4"><br>

<button onclick="startGame()">🎮 START GAME</button>

<div id="game">

<h2>🏎️ Race Arena</h2>

<p id="names"></p>

<button onclick="move(1)">🔴 P1</button>
<button onclick="move(2)">🔵 P2</button>
<button onclick="move(3)">🟢 P3</button>
<button onclick="move(4)">🟡 P4</button>

<div id="r1" class="racer">🔴🚗</div>
<div id="r2" class="racer">🔵🚗</div>
<div id="r3" class="racer">🟢🚗</div>
<div id="r4" class="racer">🟡🚗</div>

</div>

</div>

<script>

let a=0;
let b=0;
let c=0;
let d=0;

function startGame(){

document.getElementById("game").style.display="block";

document.getElementById("names").innerHTML=
document.getElementById("p1").value+" | "+
document.getElementById("p2").value+" | "+
document.getElementById("p3").value+" | "+
document.getElementById("p4").value;

}

function move(player){

if(player==1){
a+=20;
document.getElementById("r1").style.marginLeft=a+"px";
if(a>=300) alert("🏆 "+document.getElementById("p1").value+" Wins!");
}

if(player==2){
b+=20;
document.getElementById("r2").style.marginLeft=b+"px";
if(b>=300) alert("🏆 "+document.getElementById("p2").value+" Wins!");
}

if(player==3){
c+=20;
document.getElementById("r3").style.marginLeft=c+"px";
if(c>=300) alert("🏆 "+document.getElementById("p3").value+" Wins!");
}

if(player==4){
d+=20;
document.getElementById("r4").style.marginLeft=d+"px";
if(d>=300) alert("🏆 "+document.getElementById("p4").value+" Wins!");
}

}

</script>

</body>
</html>
