<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Creator</title>

<style>

body{
background:#0a0a0a;
font-family:Arial,sans-serif;
text-align:center;
color:white;
padding:20px;
}

.logo{
font-size:40px;
color:#00ffff;
text-shadow:0 0 10px #00ffff,
0 0 20px #00ffff,
0 0 40px #00ffff;
margin-bottom:20px;
}

.card{
background:#111;
border:1px solid #00ffff;
border-radius:20px;
padding:20px;
max-width:700px;
margin:auto;
box-shadow:0 0 20px #00ffff;
}

input{
width:85%;
padding:12px;
border:none;
border-radius:10px;
margin:10px;
font-size:16px;
}

button{
padding:12px 25px;
border:none;
border-radius:10px;
background:#00ffff;
font-weight:bold;
cursor:pointer;
margin:5px;
}

button:hover{
transform:scale(1.05);
}

#result{
margin-top:20px;
}

.watermark{
position:fixed;
bottom:10px;
right:10px;
opacity:0.6;
font-size:14px;
color:#00ffff;
}

img{
max-width:100%;
border-radius:15px;
margin-top:15px;
}

</style>
</head>

<body>

<h1 class="logo">⚡🤖 NEON CREATOR 🤖⚡</h1>

<div class="card">

<h2>Create AI Images & Videos</h2>

<input
type="text"
id="prompt"
placeholder="Describe your image or video">

<br>

<button onclick="generateImage()">
🎨 Generate Image
</button>

<button onclick="generateVideo()">
🎬 Generate Video
</button>

<div id="result"></div>

</div>

<div class="watermark">
⚡ Neon Creator
</div>

<script>
function generateImage(){

let prompt =
document.getElementById("prompt").value;

if(prompt===""){
alert("Please enter a prompt");
return;
}

document.getElementById("result").innerHTML=
`
<h3>🎨 AI Image Result</h3>

<img src="https://picsum.photos/800/450?random=${Date.now()}">

<p><b>Prompt:</b> ${prompt}</p>

<button onclick="downloadImage()">
📥 Download Image
</button>

<p style="opacity:0.7;">
⚡ Neon Creator
</p>
`;

}

function generateVideo(){

let prompt =
document.getElementById("prompt").value;

if(prompt===""){
alert("Please enter a prompt");
return;
}

document.getElementById("result").innerHTML=
`
<h3>🎬 AI Video Result</h3>

<p>🚧 Video Generator Coming Soon</p>

<p><b>Prompt:</b> ${prompt}</p>

<button>
📥 Download Video
</button>

<p style="opacity:0.7;">
⚡ Neon Creator
</p>
`;

}

function downloadImage(){

let link =
document.querySelector("#result img");

if(!link){
return;
}

let a=document.createElement("a");
a.href=link.src;
a.download="neon-creator-image.jpg";
a.click();

}

</script>

</body>
</html>
