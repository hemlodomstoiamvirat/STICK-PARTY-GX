<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STICK PARTY GX</title>

<style>
body{
background:#000;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

h1{
color:#ff003c;
text-shadow:0 0 20px #ff003c;
}

.card{
background:#111;
border:2px solid #ff003c;
border-radius:20px;
padding:20px;
max-width:600px;
margin:auto;
box-shadow:0 0 20px #ff003c;
}

input{
width:80%;
padding:10px;
margin:5px;
border-radius:10px;
border:none;
}

button{
background:#ff003c;
color:white;
border:none;
padding:10px 20px;
border-radius:10px;
margin:5px;
font-size:18px;
}

.racer{
font-size:30px;
margin:10px;
position:relative;
left:0;
}

#game{
display:none;
}
</style>

</head>
<body>

<h1>⚔️ STICK PARTY GX ⚔️</h1>

<div class="card">

<input id="p1" value="Player 1"><br>
<input id="p2" value="Player 2"><br>
<input id="p3" value="Player 3"><br>
<input id="p4" value="Player 4"><br>

<button onclick="startGame()">🎮 START GAME</button>

<div id="game">

<h2>🏎️ Race Arena</h2>

<button onclick="move(1)">🔴 P1</button>
<button onclick="move(2)">🔵 P2</button>
<button onclick="move(3)">🟢 P3</button>
<button onclick="move(4)">🟡 P4</button>

<div id="r1" class="racer">🔴🚗</div>
<div id="r2" class="racer">🔵🚗</div>
<div id="r3" class="racer">🟢🚗</div>
<div id="r4" class="racer">🟡🚗</div>

</div>

</div>

<script>

let pos1=0;
let pos2=0;
let pos3=0;
let pos4=0;

function startGame(){
document.getElementById("game").style.display="block";
}

function move(player){

if(player==1){
pos1+=20;
document.getElementById("r1").style.left=pos1+"px";
if(pos1>=300){
alert(document.getElementById("p1").value+" Wins!");
}
}

if(player==2){
pos2+=20;
document.getElementById("r2").style.left=pos2+"px";
if(pos2>=300){
alert(document.getElementById("p2").value+" Wins!");
}
}

if(player==3){
pos3+=20;
document.getElementById("r3").style.left=pos3+"px";
if(pos3>=300){
alert(document.getElementById("p3").value+" Wins!");
}
}

if(player==4){
pos4+=20;
document.getElementById("r4").style.left=pos4+"px";
if(pos4>=300){
alert(document.getElementById("p4").value+" Wins!");
}
}

}

</script>

</body>
</html>
